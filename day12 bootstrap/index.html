<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cards Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Bootstrap Card Practice
        </h1>

        <div class="row g-4">

            <!-- Student Card -->
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <img src="https://via.placeholder.com/300x200"
                         class="card-img-top"
                         alt="Student">

                    <div class="card-body text-center">
                        <h3 class="card-title">
                            Foram Thakker
                        </h3>

                        <p class="card-text">
                            BCA Student passionate about
                            Web Development and Design.
                        </p>

                        <button class="btn btn-primary">
                            View Profile
                        </button>
                    </div>
                </div>
            </div>

            <!-- Course Card -->
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <div class="card-body text-center">

                        <h3 class="card-title text-success">
                            Web Development
                        </h3>

                        <p class="card-text">
                            Learn HTML, CSS,
                            JavaScript and Bootstrap
                            from beginner to advanced.
                        </p>

                        <button class="btn btn-success">
                            Explore Course
                        </button>

                    </div>
                </div>
            </div>

            <!-- Contact Card -->
            <div class="col-md-4">
                <div class="card shadow h-100">
                    <div class="card-body text-center">

                        <h3 class="card-title text-danger">
                            Contact Me
                        </h3>

                        <p class="card-text">
                            Email:<br>
                            foramthakker.120@gmail.com
                            <br><br>
                            Phone:<br>
                            7862919634
                        </p>

                        <button class="btn btn-danger">
                            Send Message
                        </button>

                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
