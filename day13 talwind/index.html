<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Profile Cards</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-purple-100 min-h-screen flex items-center justify-center p-6">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Card 1 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300 w-80">
            <img src="https://via.placeholder.com/150"
                 alt="Profile"
                 class="w-32 h-32 rounded-full mx-auto border-4 border-blue-500">

            <h2 class="text-2xl font-bold text-center mt-4">
                Foram Thakker
            </h2>

            <p class="text-center text-gray-500">
                BCA Student & Web Developer
            </p>

            <div class="flex justify-center gap-2 mt-4 flex-wrap">
                <span class="bg-orange-500 text-white px-3 py-1 rounded-full">HTML</span>
                <span class="bg-blue-500 text-white px-3 py-1 rounded-full">CSS</span>
                <span class="bg-yellow-500 text-white px-3 py-1 rounded-full">JavaScript</span>
            </div>

            <button class="w-full mt-5 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-800 transition">
                Contact Me
            </button>
        </div>

        <!-- Card 2 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300 w-80">
            <img src="https://via.placeholder.com/150"
                 alt="Profile"
                 class="w-32 h-32 rounded-full mx-auto border-4 border-green-500">

            <h2 class="text-2xl font-bold text-center mt-4">
                Creative Designer
            </h2>

            <p class="text-center text-gray-500">
                UI/UX Enthusiast
            </p>

            <div class="flex justify-center gap-2 mt-4 flex-wrap">
                <span class="bg-pink-500 text-white px-3 py-1 rounded-full">Figma</span>
                <span class="bg-purple-500 text-white px-3 py-1 rounded-full">Canva</span>
                <span class="bg-red-500 text-white px-3 py-1 rounded-full">Photoshop</span>
            </div>

            <button class="w-full mt-5 bg-green-600 text-white py-2 rounded-lg hover:bg-green-800 transition">
                View Work
            </button>
        </div>

        <!-- Card 3 -->
        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300 w-80">
            <img src="https://via.placeholder.com/150"
                 alt="Profile"
                 class="w-32 h-32 rounded-full mx-auto border-4 border-purple-500">

            <h2 class="text-2xl font-bold text-center mt-4">
                Frontend Developer
            </h2>

            <p class="text-center text-gray-500">
                Responsive Website Creator
            </p>

            <div class="flex justify-center gap-2 mt-4 flex-wrap">
                <span class="bg-cyan-500 text-white px-3 py-1 rounded-full">Bootstrap</span>
                <span class="bg-indigo-500 text-white px-3 py-1 rounded-full">Tailwind</span>
                <span class="bg-gray-700 text-white px-3 py-1 rounded-full">GitHub</span>
            </div>

            <button class="w-full mt-5 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-800 transition">
                Hire Me
            </button>
        </div>

    </div>

</body>
</html>
